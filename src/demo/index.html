<style>
  :root { --ink:#1c2528; --accent:#0e7c66; --muted:#5a6568; --line:#e3e8e8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, Arial, sans-serif; color: var(--ink); background:#fafbfb; }
  header { padding: 28px 20px; border-bottom:1px solid var(--line); }
  h1 { margin:0 0 6px; font-size: 22px; }
  .mode { display:inline-block; margin-top:8px; padding:4px 10px; border-radius:999px; background:#eef5f2; color:var(--accent); font-size:12px; font-weight:700; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 20px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:18px; }
  .card h2 { font-size:16px; margin:0 0 10px; }
  .ba { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .ba figure { margin:0; }
  .ba img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; border:1px solid var(--line); display:block; }
  .ba figure.clean img { object-fit:contain; background:#f4f6f6; }
  .ba figcaption { font-size:12px; color:var(--muted); margin-top:6px; }
  .badges span { display:inline-block; background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:3px 8px; border-radius:6px; margin:8px 6px 0 0; }
  .price { font-size:18px; font-weight:800; margin-top:10px; }
  .price s { color:var(--muted); font-weight:500; font-size:14px; margin-left:6px; }
  .story { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .scene { border:1px dashed var(--line); border-radius:10px; padding:10px; font-size:13px; }
  .scene b { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
  footer { color:var(--muted); font-size:12px; text-align:center; padding:24px; }
</style>
</head>

<script>
  // Safe DOM construction: all user-facing data is set via textContent or
  // typed DOM attributes — no innerHTML with interpolated values.
  // innerHTML is used only for static structural markup with no data.
  const data = JSON.parse(document.getElementById('demo-data').textContent);
  const gallery = document.getElementById('gallery');

  for (const p of data.products) {
    // Card container
    const card = document.createElement('section');
    card.className = 'card';

    // Title
    const h2 = document.createElement('h2');
    h2.textContent = p.title;
    card.appendChild(h2);

    // Before / after images
    const ba = document.createElement('div');
    ba.className = 'ba';

    function makeFigure(src, altText, captionText, className) {
      const fig = document.createElement('figure');
      if (className) fig.className = className;
      const img = document.createElement('img');
      img.src = src;
      img.alt = altText;
      const cap = document.createElement('figcaption');
      cap.textContent = captionText;
      fig.appendChild(img);
      fig.appendChild(cap);
      return fig;
    }

    ba.appendChild(makeFigure(p.sourceImage, p.id + ' source', 'Source (as uploaded)'));
    ba.appendChild(makeFigure(p.cleanImage, p.id + ' cleaned', 'Standardized (background removed)', 'clean'));
    if (p.lifestyleImage) ba.appendChild(makeFigure(p.lifestyleImage, p.id + ' lifestyle', 'Lifestyle scene (generated)'));
    card.appendChild(ba);

    // Trust badges
    const badgesDiv = document.createElement('div');
    badgesDiv.className = 'badges';
    for (const badge of (p.trustBadges || [])) {
      const span = document.createElement('span');
      span.textContent = badge;
      badgesDiv.appendChild(span);
    }
    card.appendChild(badgesDiv);

    // Price
    const priceDiv = document.createElement('div');
    priceDiv.className = 'price';
    if (p.priceText) {
      priceDiv.appendChild(document.createTextNode(p.priceText));
    }
    if (p.regularPriceText) {
      const s = document.createElement('s');
      s.textContent = p.regularPriceText;
      priceDiv.appendChild(s);
    }
    card.appendChild(priceDiv);

    // Storyboard
    const storyDiv = document.createElement('div');
    storyDiv.className = 'story';
    for (const s of (p.storyboard || [])) {
      const scene = document.createElement('div');
      scene.className = 'scene';

      const label = document.createElement('b');
      label.textContent = 'Scene ' + s.scene + ' — ' + s.note;
      scene.appendChild(label);

      if (s.headline) {
        const hl = document.createElement('div');
        hl.textContent = s.headline;
        scene.appendChild(hl);
      }
      if (s.price) {
        const pr = document.createElement('div');
        pr.className = 'price';
        pr.textContent = s.price;
        scene.appendChild(pr);
      }
      if (s.cta) {
        const ctaDiv = document.createElement('div');
        if (s.brand) {
          ctaDiv.textContent = s.brand + ' · ' + s.cta;
        } else {
          ctaDiv.textContent = s.cta;
        }
        scene.appendChild(ctaDiv);
      }

      storyDiv.appendChild(scene);
    }
    card.appendChild(storyDiv);

    gallery.appendChild(card);
  }
</script>
